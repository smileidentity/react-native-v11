name: Security Audit

on:
  pull_request:
    paths:
      - 'package.json'
      - 'yarn.lock'
      - 'android/*.gradle*'
      - 'android/**/*.gradle*'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  yarn-audit:
    name: Yarn Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: |
          yarn set version 3.6.1
          yarn install --immutable
      - name: Run yarn audit
        run: yarn npm audit --all --recursive

  gradle-audit:
    name: Gradle Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: |-
            --recursive
            --format=table
            ./android

  create-issue:
    name: Create Issue on Failure
    needs: [yarn-audit, gradle-audit]
    if: always() && github.event_name != 'pull_request' && (needs.yarn-audit.result == 'failure' || needs.gradle-audit.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create issue for audit failures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "security-audit" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then exit 0; fi

          FAILED_AUDITS=""
          if [ "${{ needs.yarn-audit.result }}" = "failure" ]; then
            FAILED_AUDITS="yarn"
          fi
          if [ "${{ needs.gradle-audit.result }}" = "failure" ]; then
            FAILED_AUDITS="${FAILED_AUDITS:+$FAILED_AUDITS, }gradle"
          fi

          TITLE_DATE=$(date +%Y-%m-%d)
          gh issue create \
            --title "Security: dependency vulnerabilities detected (${TITLE_DATE})" \
            --label "security-audit,priority:high" \
            --body "The daily security audit has detected vulnerabilities in: ${FAILED_AUDITS}. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
