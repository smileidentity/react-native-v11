name: Security Audit

on:
  pull_request:
    paths:
      - 'package.json'
      - 'yarn.lock'
      - 'android/*.gradle*'
      - 'android/**/*.gradle*'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  yarn-audit:
    name: Yarn Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --lockfile=yarn.lock
            --format=table

  gradle-audit:
    name: Gradle Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            --format=table
            ./android

  create-issue:
    name: Create Issue on Failure
    needs: [yarn-audit, gradle-audit]
    if: always() && github.event_name != 'pull_request' && (needs.yarn-audit.result == 'failure' || needs.gradle-audit.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create issue for audit failures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "security-audit" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then exit 0; fi

          FAILED_AUDITS=""
          if [ "${{ needs.yarn-audit.result }}" = "failure" ]; then
            FAILED_AUDITS="yarn"
          fi
          if [ "${{ needs.gradle-audit.result }}" = "failure" ]; then
            FAILED_AUDITS="${FAILED_AUDITS:+$FAILED_AUDITS, }gradle"
          fi

          TITLE_DATE=$(date +%Y-%m-%d)
          gh issue create \
            --title "Security: dependency vulnerabilities detected (${TITLE_DATE})" \
            --label "security-audit,priority:high" \
            --body "The daily security audit has detected vulnerabilities in: ${FAILED_AUDITS}. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
