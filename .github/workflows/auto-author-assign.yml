# .github/workflows/auto-author-assign.yml
name: Auto Author Assign

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  assign-author:
    if: ${{ !contains(github.event.pull_request.assignees, '') }}
    runs-on: ubuntu-latest
    steps:
      - uses: toshimaru/auto-author-assign@6a51ef50ddaa46de1440ab86bf7596a5e45f539d # v2.1.1
